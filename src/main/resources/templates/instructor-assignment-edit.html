<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Edit Assignment - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 32px;
        }
        .card h1 { margin-bottom: 24px; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
        }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a th:href="'/instructor/modules/' + ${moduleId} + '/assignments'" class="back-link">← Back to Assignments</a>

    <div class="card">
        <h1 th:text="'Edit Assignment: ' + ${assignment.title}">Edit Assignment</h1>

        <form th:action="'/instructor/assignments/' + ${assignment.id} + '/edit'" method="post">
            <div class="form-group">
                <label>Assignment Title</label>
                <input type="text" name="title" th:value="${assignment.title}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" th:text="${assignment.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Points Possible</label>
                <input type="number" name="pointsPossible" th:value="${assignment.pointsPossible}" required>
            </div>
            <div class="form-group">
                <label>Due Date (YYYY-MM-DD)</label>
                <input type="date" name="dueDate" th:value="${#temporals.format(assignment.dueDate, 'yyyy-MM-dd')}">
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Changes →</button>
                <a th:href="'/instructor/modules/' + ${moduleId} + '/assignments'" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
