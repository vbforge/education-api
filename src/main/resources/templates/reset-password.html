<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - EduFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: #000000;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(10,132,255,0.15) 0%, transparent 50%);
      z-index: -1;
    }
    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .card {
      background: rgba(28,28,32,0.9);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 40px 32px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, #86868b); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 16px;
      color: #f5f5f7;
    }
    input:focus { outline: none; border-color: #0a84ff; }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0a84ff;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #0063ce; }
    .alert {
      padding: 12px 16px;
      border-radius: 14px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-error { background: rgba(255,69,58,0.15); color: #ff453a; border: 1px solid rgba(255,69,58,0.3); }
  </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
  <div class="card">
    <div class="logo">
      <h1>Create New Password</h1>
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post">
      <input type="hidden" name="token" th:value="${token}">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" required minlength="8">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" required>
      </div>
      <button type="submit" class="btn">Reset Password →</button>
    </form>
  </div>
</div>
</body>
</html>
