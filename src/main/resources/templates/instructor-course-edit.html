<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Edit Course - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 32px;
        }
        .card h1 { margin-bottom: 24px; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: #0a84ff; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .alert-success { background: rgba(52,199,89,0.15); color: #34c759; }
        .alert-error { background: rgba(255,69,58,0.15); color: #ff453a; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a href="/instructor/courses" class="back-link">← Back to Courses</a>

    <div class="card">
        <h1 th:text="'Edit Course: ' + ${course.name}">Edit Course</h1>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="'/instructor/courses/' + ${course.id} + '/edit'" method="post">
            <div class="form-group">
                <label>Course Name *</label>
                <input type="text" name="name" th:value="${course.name}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" th:text="${course.description}"></textarea>
            </div>
            <div class="form-group">
                <label>Syllabus</label>
                <textarea name="syllabus" rows="4" th:text="${course.syllabus}"></textarea>
            </div>
            <div class="form-group">
                <label>Schedule</label>
                <input type="text" name="schedule" th:value="${course.schedule}">
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Changes →</button>
                <a href="/instructor/courses" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
