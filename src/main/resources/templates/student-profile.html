<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.5;
            min-height: 100vh;
        }
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .nav-links a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .logout-btn {
            background: none;
            border: none;
            color: #ff453a;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .card {
            background: rgba(28, 28, 32, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            margin-bottom: 24px;
        }
        .card h1 {
            font-size: 28px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #0a84ff;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #0a84ff;
            color: white;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.3);
        }
        .alert-error {
            background: rgba(255, 69, 58, 0.15);
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.3);
        }
        .back-link {
            color: #0a84ff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 24px;
        }
        hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 24px 0;
        }
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .card { padding: 24px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/student/dashboard">Dashboard</a>
        <a href="/student/courses">Courses</a>
        <a href="/student/grades">Grades</a>
        <a href="/student/profile">Profile</a>
        <div class="user-menu">
            <span sec:authentication="name" style="color: #86868b;"></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Sign Out</button>
            </form>
            <div class="avatar">
                <span sec:authentication="principal.username" th:text="${#strings.substring(#strings.toUpperCase(#authentication.name), 0, 1)}">U</span>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <a href="/student/dashboard" class="back-link">← Back to Dashboard</a>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Profile Info -->
    <div class="card">
        <h1>👤 My Profile</h1>

        <div class="info-row" style="display: flex; margin-bottom: 16px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08);">
            <div style="width: 120px; color: #86868b;">Email</div>
            <div th:text="${student.email}" style="flex: 1;">email@example.com</div>
        </div>
        <div class="info-row" style="display: flex; margin-bottom: 16px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08);">
            <div style="width: 120px; color: #86868b;">Role</div>
            <div th:text="${student.role}" style="flex: 1;">STUDENT</div>
        </div>
        <div class="info-row" style="display: flex; margin-bottom: 16px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08);">
            <div style="width: 120px; color: #86868b;">Member Since</div>
            <div th:text="${#temporals.format(student.createdAt, 'MMM dd, yyyy')}" style="flex: 1;">Date</div>
        </div>
    </div>

    <!-- Update Name Form -->
    <div class="card">
        <h2 style="font-size: 20px; margin-bottom: 16px;">✏️ Update Name</h2>
        <form th:action="@{/student/profile/update-name}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" th:value="${student.name}" required>
            </div>
            <button type="submit" class="btn btn-primary">Update Name →</button>
        </form>
    </div>

    <!-- Change Password Form -->
    <div class="card">
        <h2 style="font-size: 20px; margin-bottom: 16px;">🔐 Change Password</h2>
        <form th:action="@{/student/profile/change-password}" method="post">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="currentPassword" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword" minlength="8" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary">Change Password →</button>
        </form>
    </div>
</div>
</body>
</html>
