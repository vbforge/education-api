<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Courses - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: #f5f5f7; text-decoration: none; font-size: 14px; }
        .user-menu { display: flex; align-items: center; gap: 16px; }
        .avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logout-btn {
            background: none; border: none;
            color: #ff453a; cursor: pointer;
            font-size: 14px; padding: 8px 16px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 32px; }
        .btn {
            background: #0a84ff; color: white; border: none;
            padding: 8px 16px; border-radius: 12px;
            font-size: 13px; cursor: pointer; text-decoration: none;
        }
        .btn-danger { background: rgba(255,69,58,0.15); color: #ff453a; }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .course-card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .course-header { padding: 20px; }
        .course-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .course-instructor { font-size: 13px; color: #0a84ff; margin-bottom: 12px; }
        .course-stats { display: flex; gap: 16px; font-size: 13px; color: #86868b; margin-bottom: 16px; }
        .course-actions { display: flex; gap: 12px; padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
        }
        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .alert-success { background: rgba(52,199,89,0.15); color: #34c759; }
        .alert-error { background: rgba(255,69,58,0.15); color: #ff453a; }
        @media (max-width: 768px) {
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/courses">Courses</a>
        <div class="user-menu">
            <span sec:authentication="name" style="color: #86868b;"></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Sign Out</button>
            </form>
            <div class="avatar">A</div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>All Courses</h1>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="courses-grid">
        <div th:each="course : ${courses}" class="course-card">
            <div class="course-header">
                <div class="course-title" th:text="${course.name}">Course Name</div>
                <div class="course-instructor" th:text="'👨‍🏫 ' + ${course.instructor}">Instructor</div>
                <div class="course-stats">
                    <span>📦 <span th:text="${course.moduleCount}">0</span> modules</span>
                    <span>👥 <span th:text="${course.enrollmentCount}">0</span> students</span>
                </div>
            </div>
            <div class="course-actions">
                <form th:action="'/admin/courses/' + ${course.id} + '/delete'" method="post" style="flex: 1;">
                    <button type="submit" class="btn btn-danger" style="width: 100%;" onclick="return confirm('Delete this course? All modules and assignments will be deleted.')">Delete Course</button>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(courses)}" style="text-align: center; padding: 60px; color: #86868b;">
            No courses found
        </div>
    </div>

    <div th:if="${page != null and page.totalPages > 1}" class="pagination">
        <a th:if="${page.page > 0}" th:href="'/admin/courses?page=' + ${page.page - 1} + '&size=' + ${page.size}"
           class="btn">← Previous</a>
        <span style="padding: 10px 20px;">Page <span th:text="${page.page + 1}">1</span> of <span th:text="${page.totalPages}">1</span></span>
        <a th:if="${page.page + 1 < page.totalPages}" th:href="'/admin/courses?page=' + ${page.page + 1} + '&size=' + ${page.size}"
           class="btn">Next →</a>
    </div>
</div>
</body>
</html>
