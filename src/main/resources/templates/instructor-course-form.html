<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Course - EduFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.5;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .back-link {
            color: #0a84ff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 24px;
        }

        .card {
            background: rgba(28, 28, 32, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
        }

        .card h1 {
            font-size: 28px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0a84ff;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: #0a84ff;
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a href="/instructor/courses" class="back-link">← Back to Courses</a>

    <div class="card">
        <h1>Create New Course</h1>

        <form th:action="@{/instructor/courses/create}" method="post">
            <div class="form-group">
                <label>Course Name *</label>
                <input type="text" name="name" required placeholder="e.g., Advanced Web Development">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" placeholder="Brief description of the course"></textarea>
            </div>

            <div class="form-group">
                <label>Instructor</label>
                <input type="text" name="instructor" th:value="${#authentication.name}" placeholder="Instructor name">
            </div>

            <div class="form-group">
                <label>Syllabus</label>
                <textarea name="syllabus" rows="4" placeholder="Course syllabus, topics covered, etc."></textarea>
            </div>

            <div class="form-group">
                <label>Schedule</label>
                <input type="text" name="schedule" placeholder="e.g., Mon/Wed 2:00 PM - 3:30 PM">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Create Course →</button>
                <a href="/instructor/courses" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
