<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.5;
        }
        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: #f5f5f7; text-decoration: none; font-size: 14px; font-weight: 500; }
        .user-menu { display: flex; align-items: center; gap: 16px; }
        .avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logout-btn {
            background: none; border: none;
            color: #ff453a; cursor: pointer;
            font-size: 14px; padding: 8px 16px;
            border-radius: 8px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
        .welcome { margin-bottom: 40px; }
        .welcome h1 {
            font-size: 48px; font-weight: 700; letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .welcome p { color: #86868b; font-size: 18px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }
        .stat-card {
            background: rgba(30, 30, 35, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .stat-label {
            font-size: 14px;
            color: #86868b;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .stat-value { font-size: 44px; font-weight: 700; color: #fff; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }
        .section-header h2 { font-size: 28px; font-weight: 600; }
        .section-header a { color: #0a84ff; text-decoration: none; font-size: 14px; }
        .btn {
            background: #0a84ff; color: white; border: none;
            padding: 8px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 500;
            cursor: pointer; text-decoration: none; display: inline-block;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); }
        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .welcome h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/courses">Courses</a>
        <div class="user-menu">
            <span sec:authentication="name" style="color: #86868b;"></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Sign Out</button>
            </form>
            <div class="avatar">
                <span sec:authentication="principal.username" th:text="${#strings.substring(#strings.toUpperCase(#authentication.name), 0, 1)}">A</span>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome">
        <h1>Admin Dashboard</h1>
        <p>Manage users, courses, and monitor system activity.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Students</div>
            <div class="stat-value" th:text="${totalStudents}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Courses</div>
            <div class="stat-value" th:text="${totalCourses}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Enrollments</div>
            <div class="stat-value" th:text="${totalEnrollments}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending Grading</div>
            <div class="stat-value" th:text="${pendingGrading}">0</div>
        </div>
    </div>

    <div class="section-header">
        <h2>Quick Actions</h2>
    </div>
    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <a href="/admin/users/create" class="btn">+ Add New User</a>
        <a href="/admin/courses" class="btn btn-secondary">Manage Courses</a>
        <a href="/admin/users" class="btn btn-secondary">Manage Users</a>
    </div>
</div>
</body>
</html>
