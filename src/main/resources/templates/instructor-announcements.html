<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo:hover {
            text-shadow: 0 0 10px #05a3b2;
            transform: scale(1.05);
            transition: 0.1s ease;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 { margin-bottom: 20px; font-size: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        input, textarea, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #0a84ff; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .announcement-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .announcement-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .announcement-meta {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 12px;
        }
        .announcement-message {
            font-size: 14px;
            line-height: 1.5;
            color: #a1a1a6;
        }
        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .alert-success { background: rgba(52,199,89,0.15); color: #34c759; }
        .alert-error { background: rgba(255,69,58,0.15); color: #ff453a; }
        .empty-state { text-align: center; padding: 60px; color: #86868b; }
        .btn-group { display: flex; gap: 12px; margin-top: 16px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">
        <span>Education </span>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M4 6L12 2L20 6V18L12 22L4 18V6Z" stroke="#00d4ff" stroke-width="2"/>
            <text x="6" y="15" fill="#00d4ff" font-size="8">API</text>
        </svg>
    </a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a href="/instructor/dashboard" class="back-link">← Back to Dashboard</a>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Create Announcement -->
    <div class="card">
        <h2>📢 Post New Announcement</h2>
        <form th:action="@{/instructor/announcements/create}" method="post">
            <div class="form-group">
                <label>Course</label>
                <select name="courseId" required>
                    <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.name}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" required placeholder="Announcement title...">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="5" required placeholder="Write your announcement here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Post Announcement →</button>
        </form>
    </div>

    <!-- Recent Announcements -->
    <div class="card">
        <h2>📋 Recent Announcements</h2>
        <div th:if="${not #lists.isEmpty(announcements)}">
            <div th:each="ann : ${announcements}" class="announcement-item">
                <div class="announcement-title" th:text="${ann.title}">Title</div>
                <div class="announcement-meta">
                    <span th:text="'📘 ' + ${ann.courseName}"></span>
                    <span th:text="' • Posted: ' + ${ann.postedAt}"></span>
                </div>
                <div class="announcement-message" th:text="${ann.message}">Message</div>
                <div class="btn-group">
                    <form th:action="'/instructor/announcements/' + ${ann.id} + '/delete'" method="post">
                        <button type="submit" class="btn btn-secondary" style="background: rgba(255,69,58,0.15); color: #ff453a;" onclick="return confirm('Delete this announcement?')">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
            No announcements yet. Post your first announcement above!
        </div>
    </div>
</div>
</body>
</html>
