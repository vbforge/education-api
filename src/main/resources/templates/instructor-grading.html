<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${title}">Grade Submissions - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; background: #000000; color: #f5f5f7; }
        .navbar { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 32px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: #f5f5f7; text-decoration: none; font-size: 14px; font-weight: 500; }
        .user-menu { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #3a3a3a, #1a1a1a); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }
        .logout-btn { background: none; border: none; color: #ff453a; cursor: pointer; font-size: 14px; padding: 8px 16px; border-radius: 8px; }
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card { background: rgba(28,28,32,0.8); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; margin-bottom: 24px; }
        .card-header { padding: 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .card-header h2 { font-size: 20px; font-weight: 600; }
        .card-body { padding: 28px; }
        .submission-item { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .submission-item:last-child { border-bottom: none; }
        .submission-info h4 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .submission-meta { font-size: 13px; color: #86868b; margin-top: 4px; }
        .pending-badge { background: rgba(255,159,10,0.15); color: #ff9f0a; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .btn { padding: 8px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-primary:hover { background: #0063ce; }
        .empty-state { text-align: center; padding: 60px 20px; color: #86868b; }
        .alert { padding: 16px 20px; border-radius: 14px; margin-bottom: 20px; }
        .alert-success { background: rgba(52,199,89,0.15); color: #34c759; border: 1px solid rgba(52,199,89,0.3); }
        @media (max-width: 768px) {
            .submission-item { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
        <div class="user-menu">
            <span sec:authentication="name" style="color: #86868b;"></span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Sign Out</button>
            </form>
            <div class="avatar">
                <span sec:authentication="principal.username" th:text="${#strings.substring(#strings.toUpperCase(#authentication.name), 0, 1)}">U</span>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <a th:href="'/instructor/courses'" class="back-link">← Back to Courses</a>

    <div th:if="${message}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${message}">Success</span>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 th:text="'📝 Pending Submissions - ' + ${course.name}">Pending Submissions</h2>
        </div>
        <div class="card-body">
            <div th:if="${not #lists.isEmpty(submissions)}">
                <div th:each="sub : ${submissions}" class="submission-item">
                    <div class="submission-info">
                        <h4 th:text="${sub.assignmentTitle}">Assignment Title</h4>
                        <div class="submission-meta">
                            <span th:text="'👨‍🎓 Student: ' + ${sub.studentName}"></span>
                            <span th:text="' • Submitted: ' + ${#temporals.format(sub.submittedAt, 'MMM dd, yyyy')}"></span>
                        </div>
                    </div>
                    <div>
                        <span class="pending-badge">Pending Review</span>
                        <a th:href="'/instructor/submissions/' + ${sub.id} + '/grade'" class="btn btn-primary" style="margin-left: 12px;">Grade →</a>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(submissions)}" class="empty-state">
                <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
                <h3>All caught up!</h3>
                <p>No pending submissions to grade.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
