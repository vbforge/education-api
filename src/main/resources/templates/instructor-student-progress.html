<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Student Details - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h1 { margin-bottom: 20px; font-size: 24px; }
        .info-row {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .info-label { width: 150px; color: #86868b; }
        .info-value { flex: 1; }
        .assignment-item {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .progress-bar {
            width: 150px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0a84ff, #5e5ce0);
            border-radius: 10px;
        }
        .grade-score {
            font-weight: 600;
            color: #34c759;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-graded { background: rgba(52,199,89,0.15); color: #34c759; }
        .status-pending { background: rgba(255,159,10,0.15); color: #ff9f0a; }
        .status-submitted { background: rgba(10,132,255,0.15); color: #0a84ff; }
        .empty-state { text-align: center; padding: 60px; color: #86868b; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a th:href="'/instructor/courses/' + ${courseId} + '/progress'" class="back-link">← Back to Course Progress</a>

    <!-- Student Info -->
    <div class="card" th:if="${student != null and student.name != null}">
        <h1 th:text="'Student: ' + ${student.name}">Student Details</h1>
        <div class="info-row">
            <div class="info-label">Email</div>
            <div class="info-value" th:text="${student.email}">email@example.com</div>
        </div>
        <div class="info-row">
            <div class="info-label">Enrolled</div>
            <div class="info-value" th:text="${student.enrolledAt}">Date</div>
        </div>
        <div class="info-row">
            <div class="info-label">Current Grade</div>
            <div class="info-value">
                <span th:if="${student.grade != null}" class="grade-score" th:text="${student.grade} + '%'">85%</span>
                <span th:unless="${student.grade != null}">Not graded yet</span>
            </div>
        </div>
    </div>

    <!-- Assignment Grades -->
    <div class="card">
        <h2>📝 Assignment Grades</h2>
        <div th:if="${not #lists.isEmpty(assignments)}">
<!--            <div th:each="assignment : ${assignments}" class="assignment-item">-->
<!--                <div style="flex: 2;">-->
<!--                    <strong th:text="${assignment.title}">Assignment Title</strong>-->
<!--                    <div style="font-size: 12px; color: #86868b;" th:text="'Due: ' + ${assignment.dueDate}"></div>-->
<!--                </div>-->
<!--                <div style="flex: 1; text-align: center;">-->
<!--                    <span th:text="${assignment.pointsPossible} + ' pts'"></span>-->
<!--                </div>-->
<!--                <div style="flex: 1; text-align: center;">-->
<!--                    <span th:if="${assignment.score != null}" class="grade-score" th:text="${assignment.score} + ' / ' + ${assignment.pointsPossible}"></span>-->
<!--                    <span th:unless="${assignment.score != null}">Not graded</span>-->
<!--                </div>-->
<!--                <div>-->
<!--                    <span th:if="${assignment.status == 'GRADED'}" class="status-badge status-graded">✓ Graded</span>-->
<!--                    <span th:if="${assignment.status == 'SUBMITTED'}" class="status-badge status-submitted">Submitted</span>-->
<!--                    <span th:if="${assignment.status == 'PENDING'}" class="status-badge status-pending">Pending</span>-->
<!--                </div>-->
<!--            </div>-->

            <div th:each="assignment : ${assignments}" class="assignment-item">
                <div style="flex: 2;">
                    <strong th:text="${assignment.title}">Assignment Title</strong>
                    <div style="font-size: 12px; color: #86868b;" th:text="'Due: ' + ${assignment.dueDate}"></div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <span th:text="${assignment.pointsPossible} + ' pts'"></span>
                </div>
                <div style="flex: 1; text-align: center;">
                    <span th:if="${assignment.score != null}" class="grade-score" th:text="${assignment.score} + ' / ' + ${assignment.pointsPossible}"></span>
                    <span th:unless="${assignment.score != null}">Not graded</span>
                </div>
                <div>
                    <span th:if="${assignment.status == 'GRADED'}" class="status-badge status-graded">✓ Graded</span>
                    <span th:if="${assignment.status == 'SUBMITTED'}" class="status-badge status-submitted">Submitted</span>
                    <span th:if="${assignment.status == 'PENDING'}" class="status-badge status-pending">Pending</span>
                </div>
                <div>
                    <a th:if="${assignment.filePath != null}"
                       th:href="'/files/' + ${assignment.filePath}"
                       class="btn btn-secondary"
                       style="padding: 4px 12px; font-size: 12px;">
                        📎 Download
                    </a>
                </div>
            </div>

        </div>
        <div th:if="${#lists.isEmpty(assignments)}" class="empty-state">
            No assignments submitted yet.
        </div>
    </div>
</div>
</body>
</html>
