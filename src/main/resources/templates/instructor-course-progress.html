<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Student Progress - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
        }
        .card h1 { margin-bottom: 20px; font-size: 24px; }
        .student-item {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .student-item:last-child { border-bottom: none; }
        .progress-bar {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0a84ff, #5e5ce0);
            border-radius: 10px;
        }
        .grade {
            font-size: 18px;
            font-weight: 600;
            color: #34c759;
        }
        .grade-na {
            font-size: 18px;
            font-weight: 600;
            color: #86868b;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-size: 13px;
        }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .stats-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat-badge {
            background: rgba(10,132,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .empty-state { text-align: center; padding: 60px; color: #86868b; }
        @media (max-width: 768px) {
            .student-item { flex-direction: column; text-align: center; }
            .progress-bar { width: 100%; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a href="/instructor/courses" class="back-link">← Back to Courses</a>

    <div class="card">
        <h1 th:if="${course != null}" th:text="'Student Progress - ' + ${course.name}">Student Progress</h1>
        <h1 th:unless="${course != null}">Student Progress</h1>

        <div class="stats-summary" th:if="${course != null}">
            <span class="stat-badge">👥 Total Students: <span th:text="${totalStudents}">0</span></span>
            <span class="stat-badge">📊 Avg Progress: <span th:text="${avgProgress}">0</span>%</span>
            <span class="stat-badge">⭐ Avg Grade: <span th:text="${avgGrade}">0</span>%</span>
            <span class="stat-badge">✅ Completed: <span th:text="${completedCount}">0</span></span>
        </div>

        <div th:if="${not #lists.isEmpty(students)}">
            <div th:each="student : ${students}" class="student-item">
                <div style="min-width: 150px;">
                    <strong th:text="${student.name}">Student Name</strong>
                    <div style="font-size: 12px; color: #86868b;" th:text="'Enrolled: ' + ${student.enrolledAt}"></div>
                </div>
                <div style="min-width: 200px;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span th:text="'Progress: ' + ${student.progressPct} + '%'" style="font-size: 13px; min-width: 80px;"></span>
                        <div class="progress-bar">
                            <div class="progress-fill" th:style="'width: ' + ${student.progressPct} + '%'"></div>
                        </div>
                    </div>
                </div>
                <div style="min-width: 80px; text-align: center;">
                    <span th:if="${student.grade != null}" class="grade" th:text="${student.grade} + '%'">85%</span>
                    <span th:unless="${student.grade != null}" class="grade-na">N/A</span>
                </div>
                <div>
                    <a th:href="'/instructor/students/' + ${student.id} + '/progress'" class="btn btn-secondary">View Details →</a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(students)}" class="empty-state">
            📖 No students enrolled in this course yet.
        </div>
    </div>
</div>
</body>
</html>
