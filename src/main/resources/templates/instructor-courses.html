<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Courses - EduFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.5;
            min-height: 100vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-name {
            font-size: 14px;
            color: #86868b;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ff453a;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 69, 58, 0.1);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .btn {
            background: #0a84ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #0a84ff;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: rgba(255, 69, 58, 0.15);
            color: #ff453a;
        }

        .btn-danger:hover {
            background: rgba(255, 69, 58, 0.25);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .course-card {
            background: rgba(28, 28, 32, 0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .course-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .course-banner {
            height: 100px;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            position: relative;
        }

        .course-icon {
            position: absolute;
            bottom: -20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: #0a84ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .course-content {
            padding: 28px 20px 20px 20px;
        }

        .course-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .course-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #86868b;
            margin-bottom: 16px;
        }

        .course-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .empty-state p {
            color: #86868b;
            margin-bottom: 24px;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border: 1px solid rgba(52, 199, 89, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
        <div class="user-menu">
            <span class="user-name" sec:authentication="name">User</span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="logout-btn">Sign Out</button>
            </form>
            <div class="avatar">
                <span sec:authentication="principal.username" th:text="${#strings.substring(#strings.toUpperCase(#authentication.name), 0, 1)}">U</span>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <div>
            <h1>My Courses</h1>
            <p style="color: #86868b; margin-top: 8px;">Manage and organize your courses</p>
        </div>
        <a href="/instructor/courses/create" class="btn btn-primary">+ Create New Course</a>
    </div>

    <div th:if="${message}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${message}">Success message</span>
    </div>

    <div th:if="${not #lists.isEmpty(courses)}" class="courses-grid">
        <div th:each="course : ${courses}" class="course-card">
            <div class="course-banner">
                <div class="course-icon">📚</div>
            </div>
            <div class="course-content">
                <div class="course-title" th:text="${course.name}">Course Name</div>
                <div class="course-stats">
                    <span>👥 <span th:text="${course.enrollmentCount}">0</span> students</span>
                    <span>📦 <span th:text="${course.moduleCount}">0</span> modules</span>
                    <span>⏳ <span th:text="${course.pendingSubmissions}">0</span> to grade</span>
                </div>
                <div class="course-actions">
                    <a th:href="'/instructor/courses/' + ${course.id}" class="btn btn-secondary" style="flex: 1; text-align: center;">Manage</a>
                    <a th:href="'/instructor/courses/' + ${course.id} + '/grade'" class="btn btn-primary" style="flex: 1; text-align: center;">Grade</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(courses)}" class="empty-state">
        <div class="empty-state-icon">📖</div>
        <h3>No courses yet</h3>
        <p>Create your first course to start teaching!</p>
        <a href="/instructor/courses/create" class="btn btn-primary">Create Course →</a>
    </div>
</div>
</body>
</html>
