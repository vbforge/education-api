<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Manage Course - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; background: #000000; color: #f5f5f7; }
        .navbar { background: rgba(0,0,0,0.9); padding: 16px 32px; display: flex; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: 600; color: white; text-decoration: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .card { background: rgba(28,28,32,0.8); border-radius: 20px; padding: 32px; }
        .btn { padding: 10px 20px; border-radius: 12px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #0a84ff; color: white; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
</nav>
<div class="container">
    <div class="card">
        <h1 th:text="'Manage: ' + ${course.name}">Manage Course</h1>
        <p style="color: #86868b; margin-top: 16px;">Course management page - Coming soon!</p>
        <div style="margin-top: 24px;">
            <a href="/instructor/courses" class="btn btn-primary">← Back to Courses</a>
        </div>
    </div>
</div>
</body>
</html>
