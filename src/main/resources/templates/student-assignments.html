<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignments - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
        }
        .card h1 { margin-bottom: 20px; font-size: 28px; }
        .assignment-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .assignment-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .assignment-meta {
            font-size: 12px;
            color: #86868b;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-pending { background: rgba(255,159,10,0.15); color: #ff9f0a; }
        .status-submitted { background: rgba(10,132,255,0.15); color: #0a84ff; }
        .status-graded { background: rgba(52,199,89,0.15); color: #34c759; }
        .btn {
            padding: 8px 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #0a84ff; color: white; }
        .empty-state { text-align: center; padding: 60px; color: #86868b; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/student/dashboard">Dashboard</a>
        <a href="/student/courses">Courses</a>
        <a href="/student/grades">Grades</a>
        <a href="/student/assignments">Assignments</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>📝 My Assignments</h1>

        <div th:if="${not #lists.isEmpty(assignments)}">
            <div th:each="assignment : ${assignments}" class="assignment-item">
                <div>
                    <div class="assignment-title" th:text="${assignment.title}">Assignment Title</div>
                    <div class="assignment-meta">
                        <span th:text="'📘 ' + ${assignment.courseName}"></span>
                        <span th:text="' • Due: ' + ${assignment.dueDate}"></span>
                    </div>
                </div>
                <div>
                    <span th:if="${assignment.status == 'PENDING'}" class="status-badge status-pending">⏳ Pending</span>
                    <span th:if="${assignment.status == 'SUBMITTED'}" class="status-badge status-submitted">✓ Submitted</span>
                    <span th:if="${assignment.status == 'GRADED'}"
                          class="status-badge status-graded" th:text="'⭐ ' + ${assignment.score} + '/' + ${assignment.pointsPossible}">Graded</span>


                    <!-- Download button for submitted/graded assignments -->
                    <a th:if="${assignment.status == 'SUBMITTED' or assignment.status == 'GRADED'}"
                       th:href="'/student/download/' + ${assignment.submissionId}"
                       class="btn btn-secondary">📎 Download</a>

                    <a th:if="${assignment.status == 'PENDING'}"
                       th:href="'/student/assignments/' + ${assignment.id} + '/submit'"
                       class="btn btn-primary" style="margin-left: 12px;">Submit →</a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(assignments)}" class="empty-state">
            🎉 No assignments found! Enjoy your break.
        </div>
    </div>
</div>
</body>
</html>
