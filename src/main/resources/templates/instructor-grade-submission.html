<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Grade Submission - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
        .back-link { color: #0a84ff; text-decoration: none; display: inline-block; margin-bottom: 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h1 { margin-bottom: 20px; font-size: 24px; }
        .info-row {
            display: flex;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .info-label { width: 120px; color: #86868b; }
        .info-value { flex: 1; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f5f5f7;
            font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: #0a84ff; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .file-link {
            background: rgba(10,132,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 16px;
        }
        .file-link a { color: #0a84ff; text-decoration: none; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/instructor/dashboard">Dashboard</a>
        <a href="/instructor/courses">My Courses</a>
    </div>
</nav>

<div class="container">
    <a th:href="'/instructor/courses/' + ${courseId} + '/grade'" class="back-link">← Back to Grading</a>

    <div class="card">
        <h1>Grade Submission</h1>

        <div class="info-row">
            <div class="info-label">Student:</div>
            <div class="info-value" th:text="${submission.studentName}">Student Name</div>
        </div>
        <div class="info-row">
            <div class="info-label">Assignment:</div>
            <div class="info-value" th:text="${submission.assignmentTitle}">Assignment Title</div>
        </div>
        <div class="info-row">
            <div class="info-label">Course:</div>
            <div class="info-value" th:text="${submission.courseName}">Course Name</div>
        </div>
        <div class="info-row">
            <div class="info-label">Submitted:</div>
            <div class="info-value" th:text="${submission.submittedAt}">Date</div>
        </div>

        <div th:if="${submission.filePath != null}" class="file-link">
            <a th:href="'/api/v1/files/' + ${submission.filePath}" target="_blank">📎 Download Submission File</a>
        </div>
    </div>

    <div class="card">
        <h1>Enter Grade</h1>

        <form th:action="'/instructor/submissions/' + ${submission.id} + '/grade'" method="post">
            <div class="form-group">
                <label>Score (0 - <span th:text="${assignmentPoints}">100</span> points)</label>
                <input type="number" name="score" step="0.5" min="0" th:max="${assignmentPoints}"
                       th:value="${submission.score}" required>
            </div>

            <div class="form-group">
                <label>Feedback (optional)</label>
                <textarea name="feedback" rows="4" th:text="${submission.feedback}"
                          placeholder="Provide feedback to the student..."></textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Grade →</button>
                <a th:href="'/instructor/courses/' + ${courseId} + '/grade'" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
