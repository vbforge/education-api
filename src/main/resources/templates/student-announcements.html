<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - EduFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            color: #f5f5f7;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #86868b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .nav-links a { color: #f5f5f7; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
        .card {
            background: rgba(28,28,32,0.8);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h1 { margin-bottom: 20px; font-size: 28px; }
        .announcement-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .announcement-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .announcement-meta {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 12px;
        }
        .announcement-message {
            font-size: 14px;
            line-height: 1.5;
            color: #a1a1a6;
        }
        .empty-state { text-align: center; padding: 60px; color: #86868b; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/" class="logo">EduFlow</a>
    <div class="nav-links">
        <a href="/student/dashboard">Dashboard</a>
        <a href="/student/courses">Courses</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>📢 Announcements</h1>

        <div th:if="${not #lists.isEmpty(announcements)}">
            <div th:each="ann : ${announcements}" class="announcement-item">
                <div class="announcement-title" th:text="${ann.title}">Title</div>
                <div class="announcement-meta">
                    <span th:text="'📘 ' + ${ann.courseName}"></span>
                    <span th:text="' • Posted: ' + ${#temporals.format(ann.postedAt, 'MMM dd, yyyy • hh:mm a')}"></span>
                </div>
                <div class="announcement-message" th:text="${ann.message}">Message</div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(announcements)}" class="empty-state">
            📭 No announcements yet. Check back later!
        </div>
    </div>
</div>
</body>
</html>
