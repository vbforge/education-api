spring:
  profiles:
    active: local
  application:
    name: education-api
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # JPA common settings
  jpa:
    open-in-view: false         # best practice — disable OSIV
    properties:
      hibernate:
        format_sql: true

  # Thymeleaf common
  thymeleaf:
    cache: false                # always off during dev; can override per profile

server:
  port: 8080

app:
  storage:
    upload-dir: uploads
    allowed-extensions: pdf,doc,docx,txt,zip,png,jpg
    max-file-size-bytes: 10485760   # 10MB